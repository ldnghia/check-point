<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d26"/>
      <stop offset="100%" stop-color="#0c0d10"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#e4ff82"/>
      <stop offset="55%" stop-color="#c9ff57"/>
      <stop offset="100%" stop-color="#7aab00"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle ring glow behind ball -->
  <circle cx="256" cy="248" r="188" fill="none" stroke="#c9ff57" stroke-width="1" opacity="0.08"/>

  <!-- Ball shadow -->
  <ellipse cx="262" cy="418" rx="118" ry="18" fill="#000" opacity="0.35"/>

  <!-- Billiard ball -->
  <circle cx="256" cy="236" r="172" fill="url(#ball)" filter="url(#shadow)"/>

  <!-- Ball stripe band -->
  <clipPath id="ballClip">
    <circle cx="256" cy="236" r="172"/>
  </clipPath>
  <rect x="84" y="195" width="344" height="82" fill="white" opacity="0.08" clip-path="url(#ballClip)"/>

  <!-- Highlight spot -->
  <ellipse cx="204" cy="174" rx="62" ry="44" fill="url(#shine)" clip-path="url(#ballClip)" transform="rotate(-18,204,174)"/>

  <!-- Number on ball -->
  <text
    x="256" y="270"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#0c0d10"
    opacity="0.85"
    letter-spacing="-6"
  >01</text>
</svg>
